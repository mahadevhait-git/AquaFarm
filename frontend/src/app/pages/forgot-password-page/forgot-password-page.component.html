<div style="max-width: 420px; margin: 50px auto;">
  <div class="card">
    <h2>{{ 'forgot.title' | i18n }}</h2>
    <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="success" *ngIf="successMessage">{{ successMessage }}</div>

    <form *ngIf="!otpSent" (ngSubmit)="requestOtp($event)">
      <div class="form-group">
        <label for="email">{{ 'register.email' | i18n }}</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" required email>
      </div>
      <button type="submit" [disabled]="loading" style="width: 100%;">
        {{ loading ? ('forgot.sendingOtp' | i18n) : ('forgot.sendOtp' | i18n) }}
      </button>
    </form>

    <form *ngIf="otpSent" (ngSubmit)="handleReset($event)">
      <div class="form-group">
        <label for="otp">{{ 'forgot.otp' | i18n }}</label>
        <input id="otp" type="text" [(ngModel)]="otp" name="otp" required>
      </div>

      <div class="form-group">
        <label for="newPassword">{{ 'forgot.newPassword' | i18n }}</label>
        <div style="display: flex; gap: 8px; align-items: center;">
          <input
            id="newPassword"
            [type]="showNewPassword ? 'text' : 'password'"
            [(ngModel)]="newPassword"
            name="newPassword"
            required
            style="flex: 1;"
          >
          <button
            type="button"
            (click)="showNewPassword = !showNewPassword"
            [attr.aria-label]="showNewPassword ? 'Hide password' : 'Show password'"
            title="Toggle password visibility"
            style="display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 38px;"
          >
            <svg *ngIf="!showNewPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M1 12C3.5 7.5 7.3 5.2 12 5.2C16.7 5.2 20.5 7.5 23 12C20.5 16.5 16.7 18.8 12 18.8C7.3 18.8 3.5 16.5 1 12Z" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <svg *ngIf="showNewPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M1 12C3.5 7.5 7.3 5.2 12 5.2C16.7 5.2 20.5 7.5 23 12C20.5 16.5 16.7 18.8 12 18.8C7.3 18.8 3.5 16.5 1 12Z" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
              <path d="M4 20L20 4" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">{{ 'forgot.confirmPassword' | i18n }}</label>
        <div style="display: flex; gap: 8px; align-items: center;">
          <input
            id="confirmPassword"
            [type]="showConfirmPassword ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required
            style="flex: 1;"
          >
          <button
            type="button"
            (click)="showConfirmPassword = !showConfirmPassword"
            [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'"
            title="Toggle password visibility"
            style="display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 38px;"
          >
            <svg *ngIf="!showConfirmPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M1 12C3.5 7.5 7.3 5.2 12 5.2C16.7 5.2 20.5 7.5 23 12C20.5 16.5 16.7 18.8 12 18.8C7.3 18.8 3.5 16.5 1 12Z" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <svg *ngIf="showConfirmPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M1 12C3.5 7.5 7.3 5.2 12 5.2C16.7 5.2 20.5 7.5 23 12C20.5 16.5 16.7 18.8 12 18.8C7.3 18.8 3.5 16.5 1 12Z" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
              <path d="M4 20L20 4" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" [disabled]="loading" style="width: 100%;">
        {{ loading ? ('forgot.resetting' | i18n) : ('forgot.submit' | i18n) }}
      </button>

      <button
        type="button"
        (click)="resendOtp()"
        [disabled]="loading || resendCooldownSeconds > 0"
        style="width: 100%; margin-top: 10px;"
      >
        {{ resendCooldownSeconds > 0 ? ('Resend OTP in ' + resendCooldownSeconds + 's') : 'Resend OTP' }}
      </button>
    </form>

    <p style="margin-top: 12px; font-size: 0.9rem;">
      <a routerLink="/login">{{ 'forgot.backToLogin' | i18n }}</a>
    </p>
  </div>
</div>
